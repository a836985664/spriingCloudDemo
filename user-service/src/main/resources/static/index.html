<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音转文字 - STT</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        #recordButton {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: background-color 0.3s;
            margin-bottom: 20px;
        }
        .recording {
            background-color: #ff4d4d !important; /* 红色表示录制中 */
            color: white;
        }
        .ready {
            background-color: #4CAF50; /* 绿色表示就绪 */
            color: white;
        }
        #status {
            margin-bottom: 20px;
            font-size: 16px;
            min-height: 20px;
        }
        #transcript {
            border: 1px solid #ccc;
            padding: 15px;
            min-height: 100px;
            background-color: #f9f9f9;
            text-align: left;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <h1>语音转文字功能 (STT)</h1>
    <p>请点击按钮开始录音，系统将使用 Web Audio API 进行录制。</p>
    
    <button id="recordButton" class="ready">开始录音</button>
    
    <div id="status">状态: 等待开始...</div>
    
    <h2>实时文本 (Transcript)</h2>
    <div id="transcript">--- 录制后文本将显示在这里 ---</div>
    
    <button id="submitButton" style="display:none; margin-top: 20px; padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">提交录音</button>

    <!-- 引入脚本文件 -->
    <script src="script.js"></script>
</body>
</html>
