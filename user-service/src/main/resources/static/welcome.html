<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎回来</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
                'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            animation: scaleIn 0.5s ease-in;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .user-info {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
        }

        .username {
            color: #333;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .nickname {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .info-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
        }

        .info-label {
            color: #999;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .info-value {
            color: #333;
            font-size: 14px;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #666;
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .token-info {
            margin-top: 30px;
            padding: 20px;
            background: #fff3cd;
            border-radius: 12px;
            text-align: left;
        }

        .token-info h3 {
            color: #856404;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .token-display {
            background: white;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            color: #333;
            max-height: 150px;
            overflow-y: auto;
        }

        .logout-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>欢迎回来！</h1>
        <p class="subtitle">登录成功，正在为您跳转...</p>

        <div class="user-info">
            <div class="avatar" id="avatar">👤</div>
            <div class="username" id="username">加载中...</div>
            <div class="nickname" id="nickname">加载中...</div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">用户ID</div>
                    <div class="info-value" id="userId">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">登录时间</div>
                    <div class="info-value" id="loginTime">-</div>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" onclick="goToDashboard()">进入首页</button>
            <button class="btn btn-secondary" onclick="viewProfile()">个人中心</button>
        </div>

        <div class="token-info">
            <h3>🔐 Token 信息</h3>
            <div class="token-display" id="tokenDisplay">加载中...</div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <script>
        // 从localStorage获取token
        const token = localStorage.getItem('token');

        if (!token) {
            // 如果没有token，跳转到登录页面
            window.location.href = '/wechat-login-test.html';
        } else {
            // 解析token并显示用户信息
            displayUserInfo();
        }

        // 显示用户信息
        function displayUserInfo() {
            try {
                // 解析JWT Token
                const parts = token.split('.');
                if (parts.length !== 3) {
                    throw new Error('Invalid token format');
                }

                const payload = JSON.parse(atob(parts[1]));

                // 更新页面信息
                document.getElementById('username').textContent = payload.username || '微信用户';
                document.getElementById('nickname').textContent = payload.nickname || '微信用户';
                document.getElementById('userId').textContent = payload.userId || '-';

                // 格式化登录时间
                const loginTime = new Date(payload.iat * 1000);
                document.getElementById('loginTime').textContent = loginTime.toLocaleString('zh-CN');

                // 显示Token
                document.getElementById('tokenDisplay').textContent = token;

                console.log('用户信息:', payload);
            } catch (error) {
                console.error('解析Token失败:', error);
                document.getElementById('tokenDisplay').textContent = 'Token解析失败';
            }
        }

        // 进入首页
        function goToDashboard() {
            // 这里可以跳转到实际的首页
            alert('跳转到首页功能待实现');
        }

        // 个人中心
        function viewProfile() {
            // 这里可以跳转到个人中心
            alert('个人中心功能待实现');
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                // 清除token
                localStorage.removeItem('token');

                // 跳转到登录页面
                window.location.href = '/wechat-login-test.html';
            }
        }
    </script>
</body>
</html>
