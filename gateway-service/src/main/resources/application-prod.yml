server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost}:8848
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        metadata:
          version: 1.0.0
          region: ${REGION:default}
      config:
        server-addr: ${NACOS_SERVER:localhost}:8848
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        refresh-enabled: true
        shared-configs:
          - data-id: common.yml
            group: ${NACOS_GROUP:DEFAULT_GROUP}
            refresh: true

    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 用户服务路由
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
          order: 1000

        # TTS 服务路由
        - id: tts-service
          uri: lb://tts-service
          predicates:
            - Path=/api/tts/**
          filters:
            - StripPrefix=2
          order: 1000

        # Eureka 服务注册中心路由
        - id: eureka-server
          uri: http://localhost:8761
          predicates:
            - Path=/eureka/**

      # 全局跨域配置 (生产环境建议限制域名)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "https://yourdomain.com"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      # 预过滤和后过滤
      preFilters:
        - name: AuthFilter
          args:
            enabled: true
      postFilters:
        - name: LoggingFilter
          args:
            enabled: true
        - name: MetricsFilter
          args:
            enabled: true

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# 日志配置
logging:
  level:
    com.example.gateway: INFO
    org.springframework.cloud.gateway: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/gateway-service.log
    max-size: 100MB
    max-history: 30
