# 高级路由配置示例

spring:
  cloud:
    gateway:
      routes:
        # 1. 基础路由 - 带路径重写
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2  # 去掉 /api/user 前缀

        # 2. 路由超时配置
        - id: tts-service-route
          uri: lb://tts-service
          predicates:
            - Path=/api/tts/**
          filters:
            - StripPrefix=2
          order: 1000  # 路由优先级

        # 3. 限流路由 (需配合 Resilience4j)
        - id: rate-limited-route
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10  # 每秒补充令牌数
                redis-rate-limiter.burstCapacity: 20  # 令牌桶容量

        # 4. 断言链示例
        - id: route-with-time
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
            - After=2024-01-01T00:00:00+08:00  # 时间后断言
            - Before=2024-12-31T23:59:59+08:00
            - Between=2024-01-01T00:00:00+08:00,2024-12-31T23:59:59+08:00
            - Cookie=username,admin  # Cookie 断言
            - Header=X-Request-Id, \d+  # Header 断言
            - Method=GET,POST  # 方法断言
            - Query=version=1.0  # 查询参数断言
            - RemoteAddr=192.168.1.0/24  # IP 断言

        # 5. 负载均衡策略
        - id: weighted-route
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
          order: 1000
          metadata:
            weight: 80  # 权重 80%

        # 6. 重试路由
        - id: retry-route
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
            - name: Retry
              args:
                retries: 3  # 重试次数
                statuses: 5XX  # 重试状态码
                methods: GET,POST  # 重试方法

        # 7. Hystrix 降级 (需配合 Hystrix)
        - id: hystrix-route
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
            - name: Hystrix
              args:
                name: fallback
                fallbackUri: forward:/fallback

        # 8. JWT 认证路由
        - id: jwt-auth-route
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
            - Header=Authorization, Bearer
          filters:
            - StripPrefix=2
            - name: JWTFilter

        # 9. 请求体修改
        - id: modify-request
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
            - name: ModifyRequest
              args:
                addRequestHeaders: |
                  X-Source: gateway
                  X-Time: ${spring.cloud.gateway.routes[0].metadata.weight}
                removeRequestHeaders: |
                  X-Bad-Header

        # 10. 响应修改
        - id: modify-response
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
            - name: ModifyResponse
              args:
                addResponseHeaders: |
                  X-Gateway: gateway-service
                  X-Version: 1.0.0
                removeResponseHeaders: |
                  X-Internal
