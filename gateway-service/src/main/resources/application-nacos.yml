# Nacos 动态配置示例

spring:
  cloud:
    gateway:
      routes:
        # 动态路由示例 - 从 Nacos 配置中心读取
        - id: ${ROUTE_ID:user-service-route}
          uri: ${ROUTE_URI:lb://user-service}
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
          order: ${ROUTE_ORDER:1000}

        # 负载均衡权重配置
        - id: weighted-user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
          order: 1000
          metadata:
            weight: 80

        # 限流配置
        - id: rate-limiter-route
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20

        # 重试配置
        - id: retry-route
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
            - name: Retry
              args:
                retries: 3
                statuses: 5XX
                methods: GET,POST

        # Hystrix 降级配置
        - id: hystrix-route
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
            - name: Hystrix
              args:
                name: fallback
                fallbackUri: forward:/fallback

# 全局跨域配置
spring.cloud.gateway.globalcors.cors-configurations['/**']:
  allowedOrigins: "*"
  allowedMethods: "*"
  allowedHeaders: "*"
  allowCredentials: true
  maxAge: 3600

# 路由元数据配置
spring.cloud.gateway.metadata:
  gateway-version: 1.0.0
  gateway-region: default

# 健康检查配置
management.health.gateway.enabled: true
